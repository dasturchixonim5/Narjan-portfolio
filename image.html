<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1" />
    <title>Galereya — Narjan Design Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="i18n.js"></script>
    <style>
        /* Specific tweaks for image gallery page */
        
        #gallery {
            padding: 120px 0 60px;
            min-height: 80vh;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-sec);
            margin-bottom: 2rem;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--accent);
        }
        /* Masonry (Pinterest) uslubi — Rasmlar hech qachon kesilmasligi uchun */
        
        .gallery-grid {
            column-count: 1;
            column-gap: 1.5rem;
            width: 100%;
        }
        
        @media (min-width: 640px) {
            .gallery-grid {
                column-count: 2;
            }
        }
        
        @media (min-width: 1024px) {
            .gallery-grid {
                column-count: 3;
            }
        }
        
        @media (min-width: 1280px) {
            .gallery-grid {
                column-count: 4;
            }
        }
        
        .gallery-grid .port-item {
            break-inside: avoid;
            page-break-inside: avoid;
            margin-bottom: 1.5rem;
            height: auto;
            min-height: 100px;
            /* Rasmsiz bo'sh karta bo'lsa kichik bo'lmasligi uchun */
            display: inline-block;
            width: 100%;
        }
        
        .gallery-grid .port-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
            /* Rasmni to'liq ko'rsatadi, kesmaydi */
            display: block;
        }
        
        @media (max-width: 768px) {
            #gallery {
                padding-top: 100px;
            }
        }
    </style>
</head>

<body>

    <!-- Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Background -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <!-- ══ NAVBAR ══ -->
    <nav id="navbar">
        <div class="wrap nav-wrap">
            <a href="index.html" class="nav-logo">DESIGNER<span class="dot">.</span>UZ</a>
            <ul class="nav-links" id="nav-links">
                <!-- Dinamik to'ldiriladi (faqat asosiy sahifa ssilkalari) -->
            </ul>
            <div class="nav-actions">
                <div class="lang-pill">
                    <button class="lang-btn on" data-lang="uz">UZ</button>
                    <button class="lang-btn" data-lang="ru">RU</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="theme-btn" id="theme-toggle">
                    <div class="t-ico d" id="t-ico">
                        <svg id="t-svg-moon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg>
                        <svg id="t-svg-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                            <circle cx="12" cy="12" r="5" />
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                            <line x1="1" y1="12" x2="3" y2="12" />
                            <line x1="21" y1="12" x2="23" y2="12" />
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </svg>
                    </div>
                    <span id="t-label">QORONG'I</span>
                </button>
            </div>
            <button class="hamburger" id="hamburger">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mob-menu">
        <div class="mob-head">
            <span class="nav-logo">DESIGNER<span class="dot">.</span>UZ</span>
            <button class="hamburger" id="mob-close">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <ul class="mob-links" id="mob-links"></ul>
        <div class="mob-langs">
            <button class="mob-lang-btn on" data-lang="uz">UZ</button>
            <button class="mob-lang-btn" data-lang="ru">RU</button>
            <button class="mob-lang-btn" data-lang="en">EN</button>
        </div>
    </div>

    <main>
        <!-- ══ GALLERY ══ -->
        <section id="gallery">
            <div class="wrap">
                <a href="index.html" class="back-link fi">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span id="gal-back">Bosh sahifaga qaytish</span>
                </a>

                <div class="fi" style="margin-bottom:4rem;">
                    <div class="sec-line">
                        <span class="sec-bar"></span>
                        <h2 class="sec-h2" id="gal-title">Galereya</h2>
                    </div>
                    <p class="sec-sub" id="gal-sub">Barcha loyihalar to'plami</p>
                </div>

                <div class="gallery-grid" id="gallery-grid">
                    <!-- Dinamik joylanadi -->
                </div>
            </div>
        </section>
    </main>

    <!-- ══ FOOTER ══ -->
    <footer>
        <div class="foot-inner">
            <div>
                <a href="index.html" class="foot-logo">DESIGNER<span class="dot">.</span>UZ</a>
                <p class="foot-copy">© <span id="yr"></span> Narjan Designer. All rights reserved.</p>
            </div>
            <button class="scroll-top" id="scroll-top">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15" />
                </svg>
            </button>
        </div>
    </footer>

    <!-- Lightbox -->
    <div id="lightbox">
        <button id="lightbox-close" aria-label="Yopish">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <button id="lightbox-prev" aria-label="Oldingi">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <div id="lightbox-img-wrap">
            <img id="lightbox-img" src="" alt="Portfolio rasm" />
        </div>
        <button id="lightbox-next" aria-label="Keyingi">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6" />
            </svg>
        </button>
        <div id="lightbox-counter">1 / X</div>
    </div>

    <script src="main.js"></script>
</body>

</html>
